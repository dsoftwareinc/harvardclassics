overrides:
  # Security pins for transitive dependencies. pnpm 11 ignores `pnpm.overrides`
  # in package.json, so overrides must live here.
  protobufjs: '^7.5.8'
  '@protobufjs/utf8': '^1.1.1'
  '@grpc/grpc-js': '^1.9.15'
  tar: '^7.5.11'
  minimatch: '^3.1.4'
  rollup: '^4.59.0'
  serialize-javascript: '^7.0.5'
  hono: '^4.12.21'
  '@hono/node-server': '^1.19.13'
  immutable: '^5.1.5'
  flatted: '^3.4.2'
  brace-expansion: '^1.1.13'
  follow-redirects: '^1.16.0'
  qs: '^6.15.2'
  ip-address: '^10.1.1'
  fast-uri: '^3.1.2'
  'express>path-to-regexp': '0.1.13'
  'router>path-to-regexp': '^8.4.0'
  # picomatch: keep v2 consumers on the patched v2; force the vulnerable
  # 4.0.0–4.0.3 range (CVE) up to 4.0.4 without disturbing the v2 line.
  'micromatch>picomatch': '^2.3.2'
  'anymatch>picomatch': '^2.3.2'
  'readdirp>picomatch': '^2.3.2'
  'picomatch@>=4.0.0 <4.0.4': '^4.0.4'
  # ajv: only the vulnerable 8.x (<8.18.0) is forced up; the unrelated v6 line is left alone.
  'ajv@>=8.0.0 <8.18.0': '^8.18.0'
allowBuilds:
  '@firebase/util': true
  '@parcel/watcher': true
  core-js: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  protobufjs: true
minimumReleaseAgeExclude:
  - '@angular/animations@21.2.15'
  - '@angular/common@21.2.15'
  - '@angular/compiler-cli@21.2.15'
  - '@angular/compiler@21.2.15'
  - '@angular/core@21.2.15'
  - '@angular/forms@21.2.15'
  - '@angular/language-service@21.2.15'
  - '@angular/platform-browser-dynamic@21.2.15'
  - '@angular/platform-browser@21.2.15'
  - '@angular/router@21.2.15'
  - '@angular/service-worker@21.2.15'
  - '@firebase/ai@2.13.0'
  - '@firebase/app-check-compat@0.4.4'
  - '@firebase/app-check@0.11.4'
  - '@firebase/app-compat@0.5.13'
  - '@firebase/app@0.14.13'
  - '@firebase/auth-compat@0.6.7'
  - '@firebase/auth@1.13.2'
  - '@firebase/data-connect@0.7.1'
  - '@firebase/firestore-compat@0.4.10'
  - '@firebase/firestore@4.15.0'
  - '@firebase/functions-compat@0.4.5'
  - '@firebase/functions@0.13.5'
  - '@firebase/messaging-compat@0.2.27'
  - '@firebase/messaging-interop-types@0.2.5'
  - '@firebase/messaging@0.13.0'
  - '@firebase/remote-config-compat@0.2.25'
  - '@firebase/remote-config@0.8.4'
  - firebase@12.14.0
onlyBuiltDependencies:
  - '@firebase/util'
  - '@parcel/watcher'
  - core-js
  - esbuild
  - lmdb
  - msgpackr-extract
  - protobufjs
